name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - arm64

    steps:
      - name: Deploy to production
        run: sudo -n -u leagueon /opt/leagueon/bin/deploy-leagueon
