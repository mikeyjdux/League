services:
  - type: web
    name: league-simple
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: league-simple-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: LEAGUE_ADMIN_USERNAME
        sync: false
      - key: LEAGUE_ADMIN_PASSWORD
        sync: false
      - key: FLASK_ENV
        value: production

databases:
  - name: league-simple-db
    plan: free
