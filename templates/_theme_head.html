<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --brand: #1d4ed8;
    --brand-dark: #1e3a8a;
    --brand-soft: #dbeafe;
    --accent: #0f766e;
    --accent-soft: #ccfbf1;
    --danger: #b91c1c;
    --danger-soft: #fee2e2;
    --surface: rgba(255, 255, 255, 0.9);
    --surface-strong: rgba(255, 255, 255, 0.98);
    --surface-muted: rgba(248, 250, 252, 0.92);
    --ink: #0f172a;
    --ink-soft: #475569;
    --muted: #64748b;
    --line: rgba(148, 163, 184, 0.22);
    --line-strong: rgba(100, 116, 139, 0.35);
    --shadow-soft: 0 20px 45px rgba(15, 23, 42, 0.08);
    --shadow-card: 0 16px 36px rgba(15, 23, 42, 0.1);
    --shadow-strong: 0 24px 60px rgba(15, 23, 42, 0.16);
    --radius-xl: 1.5rem;
    --radius-lg: 1rem;
    --radius-md: 0.8rem;
    --control-h: 2.75rem;
    --content-w: 1180px;
  }

  body.app-theme {
    font-family: 'Manrope', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(900px 380px at -8% -8%, rgba(29, 78, 216, 0.2), transparent 60%),
      radial-gradient(760px 360px at 100% 0%, rgba(15, 118, 110, 0.16), transparent 58%),
      linear-gradient(180deg, #eff6ff 0%, #f8fafc 42%, #eef2ff 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page-shell {
    max-width: var(--content-w);
    margin: 0 auto;
    padding: 1.1rem;
  }

  .glass-card {
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.65);
    box-shadow: var(--shadow-card);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .glass-card-muted {
    background: rgba(255, 255, 255, 0.76);
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .section-title {
    color: var(--brand-dark);
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .hero-title,
  .display-title {
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: -0.04em;
  }

  .hero-title {
    font-size: clamp(2rem, 4vw, 3.35rem);
    line-height: 1;
    font-weight: 700;
  }

  .display-title {
    font-size: clamp(1.5rem, 3vw, 2.45rem);
    line-height: 1.05;
    font-weight: 700;
  }

  .panel-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.03em;
  }

  .text-soft { color: var(--ink-soft); }
  .text-muted { color: var(--muted); }
  .border-line { border-color: var(--line); }
  .row-sep { border-color: rgba(148, 163, 184, 0.18); }

  .league-switcher {
    max-width: 18rem;
    position: relative;
  }

  .league-switcher-trigger {
    width: 100%;
    min-height: var(--control-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.9rem;
    padding: 0.85rem 1rem;
    border-radius: 1rem;
    border: 1px solid rgba(148, 163, 184, 0.2);
    background: rgba(255, 255, 255, 0.88);
    box-shadow: 0 16px 28px rgba(15, 23, 42, 0.08);
    text-align: left;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }

  .league-switcher-trigger:hover {
    transform: translateY(-1px);
    box-shadow: 0 20px 32px rgba(15, 23, 42, 0.1);
    border-color: rgba(37, 99, 235, 0.22);
  }

  .league-switcher-copy {
    min-width: 0;
    display: grid;
    gap: 0.15rem;
  }

  .league-switcher-current {
    font-size: 0.98rem;
    font-weight: 800;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .league-switcher-meta {
    font-size: 0.76rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .league-switcher-caret {
    flex: none;
    font-size: 0.9rem;
    font-weight: 800;
    color: var(--muted);
  }

  .league-switcher-menu {
    position: absolute;
    top: calc(100% + 0.6rem);
    left: 0;
    width: min(100vw - 2rem, 22rem);
    display: grid;
    gap: 0.55rem;
    padding: 0.75rem;
    border-radius: 1.1rem;
    border: 1px solid rgba(148, 163, 184, 0.2);
    background: rgba(255, 255, 255, 0.97);
    box-shadow: var(--shadow-strong);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    z-index: 40;
  }

  .league-switcher-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.8rem;
    padding: 0.85rem 0.95rem;
    border-radius: 0.95rem;
    background: rgba(248, 250, 252, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.12);
    color: var(--ink);
    transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
  }

  .league-switcher-option:hover {
    transform: translateY(-1px);
    background: rgba(239, 246, 255, 0.95);
    border-color: rgba(37, 99, 235, 0.18);
  }

  .league-switcher-option-active {
    background: rgba(219, 234, 254, 0.9);
    border-color: rgba(37, 99, 235, 0.2);
  }

  .league-switcher-option-name {
    font-weight: 700;
  }

  .alert-banner {
    padding: 0.9rem 1rem;
    border-radius: 1rem;
    border: 1px solid transparent;
    font-size: 0.92rem;
    font-weight: 700;
  }

  .alert-success {
    background: rgba(236, 253, 245, 0.9);
    border-color: rgba(16, 185, 129, 0.28);
    color: #065f46;
  }

  .alert-error {
    background: rgba(254, 242, 242, 0.94);
    border-color: rgba(239, 68, 68, 0.25);
    color: #991b1b;
  }

  .header-meta-stack {
    display: grid;
    gap: 0.5rem;
    width: 100%;
  }

  .btn-brand,
  .btn-accent,
  .btn-danger,
  .btn-secondary {
    min-height: var(--control-h);
    padding: 0.7rem 1rem;
    border-radius: 0.95rem;
    font-size: 0.92rem;
    font-weight: 700;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
  }

  .btn-brand {
    background: linear-gradient(135deg, var(--brand) 0%, #2563eb 100%);
    color: #fff;
    box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
  }

  .btn-brand:hover {
    transform: translateY(-1px);
    box-shadow: 0 16px 28px rgba(37, 99, 235, 0.28);
  }

  .btn-accent {
    background: linear-gradient(135deg, var(--accent) 0%, #0d9488 100%);
    color: #fff;
    box-shadow: 0 12px 24px rgba(13, 148, 136, 0.2);
  }

  .btn-accent:hover {
    transform: translateY(-1px);
    box-shadow: 0 16px 28px rgba(13, 148, 136, 0.26);
  }

  .btn-danger {
    background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
    color: #fff;
    box-shadow: 0 12px 24px rgba(220, 38, 38, 0.2);
  }

  .btn-danger:hover {
    transform: translateY(-1px);
    box-shadow: 0 16px 28px rgba(220, 38, 38, 0.26);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid rgba(148, 163, 184, 0.25);
    color: var(--ink);
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 1);
    transform: translateY(-1px);
    box-shadow: 0 14px 24px rgba(15, 23, 42, 0.08);
  }

  .btn-inline-danger {
    color: var(--danger);
    font-weight: 700;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.34rem 0.7rem;
    border-radius: 999px;
    font-size: 0.76rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .user-chip {
    max-width: 100%;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chip-brand {
    background: var(--brand-soft);
    color: var(--brand-dark);
  }

  .chip-accent {
    background: var(--accent-soft);
    color: #115e59;
  }

  .chip-danger {
    background: var(--danger-soft);
    color: #991b1b;
  }

  .chip-neutral {
    background: rgba(226, 232, 240, 0.75);
    color: var(--ink-soft);
  }

  .input-theme {
    width: 100%;
    min-width: 0;
    height: var(--control-h);
    padding: 0 0.9rem;
    border-radius: 0.85rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    background: rgba(255, 255, 255, 0.95);
    color: var(--ink);
    box-sizing: border-box;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
  }

  .input-theme:focus {
    outline: none;
    border-color: rgba(37, 99, 235, 0.6);
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    background: #fff;
  }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.9rem;
  }

  .metric-card {
    padding: 1rem;
    border-radius: 1.1rem;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.7);
  }

  .metric-label {
    color: var(--muted);
    font-size: 0.76rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .metric-value {
    display: block;
    margin-top: 0.3rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
  }

  .dashboard-grid {
    display: grid;
    gap: 1.25rem;
  }

  .dashboard-grid-wide {
    display: grid;
    gap: 1.25rem;
  }

  .dashboard-grid > *,
  .dashboard-grid-wide > * {
    min-width: 0;
  }

  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }

  .panel-copy p {
    margin-top: 0.35rem;
  }

  .table-shell {
    overflow-x: auto;
    margin: 0 -0.25rem;
    padding: 0 0.25rem 0.2rem;
    max-width: 100%;
  }

  .league-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 620px;
  }

  .league-table thead th {
    padding: 0 0.85rem 0.85rem;
    color: var(--muted);
    font-size: 0.74rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .league-table tbody tr {
    transition: background-color 0.18s ease, box-shadow 0.18s ease;
  }

  .league-table tbody tr:hover {
    background: rgba(239, 246, 255, 0.7);
  }

  .league-table tbody td {
    padding: 0.95rem 0.85rem;
    border-top: 1px solid rgba(148, 163, 184, 0.12);
    white-space: nowrap;
    font-size: 0.92rem;
  }

  .rank-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2rem;
    height: 2rem;
    border-radius: 999px;
    background: rgba(226, 232, 240, 0.65);
    color: var(--ink);
    font-weight: 800;
  }

  .team-cell {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    min-width: 0;
  }

  .team-badge {
    width: 0.75rem;
    height: 0.75rem;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
    flex-shrink: 0;
  }

  .points-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 3rem;
    padding: 0.35rem 0.65rem;
    border-radius: 999px;
    background: rgba(219, 234, 254, 0.92);
    color: var(--brand-dark);
    font-weight: 800;
  }

  .stat-note {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
    margin-top: 1.1rem;
  }

  .stat-mini {
    padding: 0.85rem 0.95rem;
    border-radius: 1rem;
    background: rgba(248, 250, 252, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.15);
  }

  .fixture-list,
  .admin-stack,
  .user-stack,
  .team-stack {
    display: grid;
    gap: 0.95rem;
  }

  .fixture-card,
  .admin-card,
  .danger-card {
    border-radius: 1.15rem;
    border: 1px solid rgba(148, 163, 184, 0.16);
    background: rgba(255, 255, 255, 0.66);
    padding: 1rem;
  }

  .danger-card {
    background: linear-gradient(180deg, rgba(254, 242, 242, 0.95) 0%, rgba(255, 255, 255, 0.9) 100%);
    border-color: rgba(248, 113, 113, 0.25);
  }

  .fixture-card-top,
  .admin-card-top,
  .entity-row,
  .fixture-footer,
  .danger-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.8rem;
    flex-wrap: wrap;
  }

  .fixture-matchup {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    margin: 1rem 0;
  }

  .fixture-team-block {
    flex: 1 1 0;
    min-width: 0;
  }

  .fixture-team-name {
    display: block;
    font-size: 1rem;
    font-weight: 800;
    line-height: 1.2;
  }

  .fixture-team-sub {
    display: block;
    margin-top: 0.18rem;
    color: var(--muted);
    font-size: 0.82rem;
  }

  .fixture-divider {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 3rem;
    height: 3rem;
    border-radius: 999px;
    background: rgba(226, 232, 240, 0.65);
    color: var(--ink-soft);
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .fixture-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 700;
  }

  .fixture-meta-item {
    display: inline-flex;
    align-items: center;
    padding: 0.28rem 0.55rem;
    border-radius: 999px;
    background: rgba(248, 250, 252, 0.88);
    border: 1px solid rgba(148, 163, 184, 0.14);
    color: var(--ink-soft);
  }

  .fixture-form-grid,
  .admin-form-grid {
    display: grid;
    gap: 0.75rem;
    margin-top: 1rem;
  }

  .score-inputs {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.65rem;
  }

  .score-box,
  .control-block {
    display: grid;
    gap: 0.35rem;
    min-width: 0;
  }

  .admin-form-span-2 {
    min-width: 0;
  }

  .field-label {
    color: var(--muted);
    font-size: 0.76rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .form-kicker {
    margin: 0;
    color: var(--muted);
    font-size: 0.76rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .fixture-action-head {
    display: grid;
    gap: 0.22rem;
  }

  .fixture-action-copy {
    margin: 0;
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.35;
  }

  .score-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .fixture-score,
  .fixture-date {
    width: 100%;
    max-width: 100%;
    min-width: 0;
    box-sizing: border-box;
  }

  input[type="datetime-local"].kickoff-picker {
    width: auto;
    max-width: 220px;
    min-width: 0;
    flex: 0 0 auto;
    box-sizing: border-box;
  }

  .control-block .kickoff-picker {
    justify-self: start;
  }

  .reschedule-controls {
    display: grid;
    gap: 0.85rem;
    max-width: 220px;
  }

  .reschedule-controls .btn-secondary,
  .reschedule-controls .kickoff-picker {
    width: 100%;
    max-width: 100%;
  }

  .result-score {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.75rem;
    border-radius: 999px;
    background: rgba(241, 245, 249, 0.92);
    font-weight: 800;
  }

  .tab-row {
    display: inline-flex;
    gap: 0.35rem;
    padding: 0.3rem;
    border-radius: 999px;
    background: rgba(226, 232, 240, 0.65);
  }

  .tab-button {
    border: 0;
    background: transparent;
    color: var(--ink-soft);
    font-size: 0.88rem;
    font-weight: 800;
    padding: 0.65rem 1rem;
    border-radius: 999px;
    transition: background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
  }

  .tab-button:hover {
    color: var(--ink);
  }

  .tab-active {
    background: rgba(255, 255, 255, 0.96);
    color: var(--brand-dark);
    box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
  }

  .tab-inactive {
    color: var(--ink-soft);
  }

  .section-grid {
    display: grid;
    gap: 1.2rem;
  }

  .fixture-actions-grid {
    gap: 0.9rem;
  }

  .fixture-action-card {
    width: 100%;
  }

  .admin-layout {
    display: grid;
    gap: 1.25rem;
  }

  .danger-actions,
  .header-actions,
  .entity-actions {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    flex-wrap: wrap;
  }

  .inline-form {
    display: flex;
    gap: 0.65rem;
    flex-wrap: wrap;
    align-items: end;
  }

  .inline-form > * {
    min-width: 0;
  }

  .drawer-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: min(100%, 26rem);
    height: 100vh;
    padding: 1.25rem;
    background: rgba(255, 255, 255, 0.94);
    border-left: 1px solid rgba(148, 163, 184, 0.2);
    box-shadow: var(--shadow-strong);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transform: translateX(100%);
    transition: transform 0.28s ease;
    z-index: 50;
    overflow-y: auto;
  }

  .modal-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    width: min(100% - 1.5rem, 30rem);
    max-height: calc(100vh - 2rem);
    padding: 1.25rem;
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 1.5rem;
    box-shadow: var(--shadow-strong);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transform: translate(-50%, -50%);
    z-index: 60;
    overflow-y: auto;
  }

  .drawer-panel.open {
    transform: translateX(0);
  }

  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.36);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 40;
  }

  .drawer-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }

  .drawer-close {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.2);
    background: rgba(255, 255, 255, 0.92);
    color: var(--ink-soft);
    font-size: 1.2rem;
    font-weight: 700;
  }

  .empty-state {
    padding: 1.1rem;
    border-radius: 1rem;
    background: rgba(248, 250, 252, 0.78);
    color: var(--muted);
    text-align: center;
    font-size: 0.92rem;
  }

  .fade-in { animation: fadeIn 0.45s ease-out both; }
  .stagger-1 { animation-delay: 0.04s; }
  .stagger-2 { animation-delay: 0.1s; }
  .stagger-3 { animation-delay: 0.16s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (min-width: 768px) {
    .page-shell {
      padding: 1.6rem;
    }

    .metric-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .dashboard-grid {
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      align-items: start;
    }

    .dashboard-grid-wide {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .fixture-form-grid {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
    }

    .admin-form-grid {
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr) auto;
      align-items: end;
    }

    .admin-form-span-2 {
      grid-column: span 2;
